---
- name: Server | Get rke2 server token
  when: "'rke2-server-group' in group_names"
  block:
  - name: Fetch rke2 token from server node
    command: cat /var/lib/rancher/rke2/server/node-token
    register: node_token_result
    delegate_to: "{{ groups['rke2-server-group'][0] }}"
    run_once: true

  - name: Server | Set rke2_token fact
    set_fact:
      rke2_token: "{{ node_token_result.stdout.strip() }}"
    run_once: true
    delegate_to: "{{ groups['rke2-agent-group'][0] }}"
    delegate_facts: true

- name: Agent | Generate rke2 configrations for agent node
  when: "'rke2-agent-group' in group_names"
  block: 
  - name: Agent | Ensure /etc/rancher/rke2 directory exists
    file:
      path: /etc/rancher/rke2
      state: directory
      mode: '0644'

  - name: Agent | Debug rke2_token
    debug:
      var: rke2_token

  - name: Agent | Use address from first server node for k8s api server address
    set_fact:
      rke2_kubeapi_server_ip: "{{ hostvars[groups['rke2-server-group'][0]].ip }}"

  - name: Agent | Debug rke2_kubeapi_server_ip
    debug:
      var: rke2_kubeapi_server_ip

  - name: Agent | Generate registries.yaml on agent node
    template:
      src: templates/registries.yaml.tpl
      dest: /etc/rancher/rke2/registries.yaml
      mode: '0644'
    when: docker_mirror is defined and docker_mirror != ''

  - name: Agent | Create config.yaml on agent nodes
    blockinfile:
      path: /etc/rancher/rke2/config.yaml
      block: |-
        server: "https://{{ rke2_kubeapi_server_ip }}:9345"
        token: "{{ rke2_token }}"
      mode: '0644'
      create: yes
      marker: "# {mark} ANSIBLE AUTO MANAGED BLOCK"
      state: present


  - name: Agent | Create rke2-cilium.conf for cilium to work with NetworkManager on agent nodes
    blockinfile:
      path: /etc/NetworkManager/conf.d/rke2-cilium.conf
      block: |-
        [keyfile]
        unmanaged-devices=interface-name:cilium*
      mode: '0644'
      create: yes
      marker: "# {mark} ANSIBLE AUTO MANAGED BLOCK"
      state: present

  - name: Agent | Reload NetworkManager
    shell: systemctl reload NetworkManager
    become: yes
