---
- name: Copy artifacts to nodes
  import_tasks: 0010-copy_artifacts.yml

- name: Install rke2 on nodes
  import_tasks: 0020-install_rke2.yml

- name: Generate configrations for rke2-server
  import_tasks: 0030-config_rke2_server.yml

- name: Start rke2-server service
  import_tasks: 0040-run_rke2_server.yml

- name: Generate configrations for rke2-agent
  import_tasks: 0050-config_rke2_agent.yml

- name: Start rke2-agent service
  import_tasks: 0060-run_rke2_agent.yml

- name: Install helm
  import_tasks: 0090-install_helm.yml
  when: helm_enabled

- name: Verify cluster
  import_tasks: 0100-verify_cluster.yml

- name: Deploy and check test application
  import_tasks: 0110-test_rke2.yml